<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordion</title>
        <!-- Bootstrap compiled CSS from main.scss file -->
        <link href="../css/main.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-sm">
        <img src="./assets/banner.jpg" class="img-fluid mt-5" alt="banner">
        <h1 class="text-navy text-center mt-5 mb-5">Accordion</h1>
        <p class="container-sm fs-5 mb-5">This is a navy accordion component of three drop downs.</p>
        <!-- Start Accordion Component Here -->
        <div class="accordion accordion-flush" id="accordionFlush">
            <!-- First Item -->
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed bg-navy text-white" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                  Accordion Item #1
                </button>
              </h2>
              <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body">Add your content for the first dropdown here.</div>
              </div>
            </div>
            <!-- Second Item -->
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed bg-navy text-white" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo">
                  Accordion Item #2
                </button>
              </h2>
              <div id="flush-collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body">Add your content for the second dropdown here.</div>
              </div>
            </div>
            <!-- Third Item -->
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed bg-navy text-white" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseThree">
                  Accordion Item #3
                </button>
              </h2>
              <div id="flush-collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
                <div class="accordion-body">Add your content for the third dropdown here.</div>
              </div>
            </div>
          </div>
          <!-- End Accordion Component -->

    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>

<footer>
    <div class="container-sm">
        <div class="mt-5 mb-5 border-top border-navy text-end"> 
            <img src="./assets/logo.png" class="img-fluid mt-5" alt="logo">
        </div>      
    </div>
</footer>

</html>
